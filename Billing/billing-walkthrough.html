<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing Agent Filter — Walkthrough</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; background: #0E121B; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Top bar ── */
.top-bar {
  height: 52px;
  background: #0E121B;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.top-bar-title {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
}
.top-bar-divider { width: 1px; height: 18px; background: rgba(255,255,255,0.12); }
.step-track {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  overflow: hidden;
}
.step-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.12);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.step-pill:hover { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); }
.step-pill.active { background: #fff; border-color: #fff; }
.step-num-dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.step-pill.active .step-num-dot { background: #0E121B; color: #fff; }
.step-label {
  font-size: 12px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
}
.step-pill.active .step-label { color: #0E121B; }

.nav-btns { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.nav-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.3); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-btn.primary { background: #fff; color: #0E121B; border-color: #fff; }
.nav-btn.primary:hover { background: #e8e8e8; }
.step-counter { font-size: 12px; color: rgba(255,255,255,0.35); padding: 0 4px; white-space: nowrap; }

/* ── Bottom caption bar ── */
.caption-bar {
  height: 44px;
  background: #161B27;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 12px;
  flex-shrink: 0;
}
.caption-step-badge {
  font-size: 11px;
  font-weight: 600;
  color: #3d64d7;
  background: #ecf3ff;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
}
.caption-text {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
}
.caption-text strong { color: rgba(255,255,255,0.9); font-weight: 500; }
.caption-usecase {
  margin-left: auto;
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  white-space: nowrap;
}

/* ── Iframe wrapper ── */
.frame-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: #fff;
}
.frame-wrap iframe {
  width: 1280px;
  height: 100%;
  border: none;
  display: block;
  transform-origin: top left;
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-title">Billing Agent Filter</div>
  <div class="top-bar-divider"></div>

  <div class="step-track">
    <div class="step-pill active" id="pill-0" onclick="goTo(0)">
      <div class="step-num-dot">1</div>
      <span class="step-label">Default view</span>
    </div>
    <div class="step-pill" id="pill-1" onclick="goTo(1)">
      <div class="step-num-dot">2</div>
      <span class="step-label">Open filter</span>
    </div>
    <div class="step-pill" id="pill-2" onclick="goTo(2)">
      <div class="step-num-dot">3</div>
      <span class="step-label">1 agent applied</span>
    </div>
    <div class="step-pill" id="pill-3" onclick="goTo(3)">
      <div class="step-num-dot">4</div>
      <span class="step-label">Row expanded</span>
    </div>
    <div class="step-pill" id="pill-4" onclick="goTo(4)">
      <div class="step-num-dot">5</div>
      <span class="step-label">Branded Calling</span>
    </div>
    <div class="step-pill" id="pill-5" onclick="goTo(5)">
      <div class="step-num-dot">6</div>
      <span class="step-label">2 agents</span>
    </div>
  </div>

  <div class="nav-btns">
    <button class="nav-btn" id="btn-prev" onclick="prev()" disabled>← Prev</button>
    <span class="step-counter" id="step-counter">1 / 6</span>
    <button class="nav-btn primary" id="btn-next" onclick="next()">Next →</button>
  </div>
</div>

<div class="frame-wrap" id="frameWrap">
  <iframe src="../billing-history-agent-filter.html" id="proto" scrolling="no"></iframe>
</div>

<div class="caption-bar">
  <div class="caption-step-badge" id="cap-badge">Step 1</div>
  <div class="caption-text" id="cap-text"><strong>Default view</strong> — Full workspace billing history, no filter applied</div>
  <div class="caption-usecase" id="cap-usecase">Use case 1: Filter Billing History by agent</div>
</div>

<script>
const STEPS = [
  {
    label: 'Default view',
    badge: 'Step 1',
    caption: '<strong>Default view</strong> — Full workspace billing history, no filter applied',
    usecase: 'Use case 1: Filter Billing History by agent',
    action: function(w) {
      // default state — do nothing
    }
  },
  {
    label: 'Open filter',
    badge: 'Step 2',
    caption: '<strong>Filter dropdown open</strong> — User clicks the Filter button to see available agents',
    usecase: 'Use case 1: Filter Billing History by agent',
    action: function(w) {
      w.toggleDropdown();
    }
  },
  {
    label: '1 agent applied',
    badge: 'Step 3',
    caption: '<strong>Filter applied: Accounts Receivable Agent</strong> — All row amounts scoped to this agent',
    usecase: 'Use case 1: Filter Billing History by agent',
    action: function(w, doc) {
      w.selectAgent('cb-1', doc.querySelector('[onclick*="cb-1"]'));
      w.applyFilter();
    }
  },
  {
    label: 'Row expanded',
    badge: 'Step 4',
    caption: '<strong>May 1, 2026 expanded</strong> — Line-item breakdown filtered to Accounts Receivable Agent',
    usecase: 'Use case 1: Filter Billing History by agent',
    action: function(w, doc) {
      w.selectAgent('cb-1', doc.querySelector('[onclick*="cb-1"]'));
      w.applyFilter();
      w.toggleRow('may');
    }
  },
  {
    label: 'Branded Calling',
    badge: 'Step 5',
    caption: '<strong>Telephony breakdown</strong> — Base carrier costs (US, Canada, UK) vs <strong style="color:#7C3AED">Branded Calling</strong> shown as separate line items',
    usecase: 'Use case 2: View branded calling vs base carrier costs',
    action: function(w, doc) {
      w.selectAgent('cb-1', doc.querySelector('[onclick*="cb-1"]'));
      w.applyFilter();
      w.toggleRow('may');
      // scroll down slightly so Branded Calling is visible
      setTimeout(function() {
        const tbl = doc.querySelector('.tbl-wrap');
        if (tbl) tbl.scrollTop = 220;
      }, 100);
    }
  },
  {
    label: '2 agents',
    badge: 'Step 6',
    caption: '<strong>2 agents selected</strong> — Accounts Receivable + Customer Success combined; Branded Calling costs reflected across both agents',
    usecase: 'Use case 2: View branded calling vs base carrier costs',
    action: function(w, doc) {
      w.selectAgent('cb-1', doc.querySelector('[onclick*="cb-1"]'));
      w.selectAgent('cb-2', doc.querySelector('[onclick*="cb-2"]'));
      w.applyFilter();
      w.toggleRow('may');
      setTimeout(function() {
        const tbl = doc.querySelector('.tbl-wrap');
        if (tbl) tbl.scrollTop = 220;
      }, 100);
    }
  }
];

let current = 0;

function scaleFrame() {
  const wrap = document.getElementById('frameWrap');
  const iframe = document.getElementById('proto');
  const scale = wrap.offsetWidth / 1280;
  iframe.style.transform = 'scale(' + scale + ')';
  iframe.style.height = Math.round(wrap.offsetHeight / scale) + 'px';
}

window.addEventListener('resize', scaleFrame);
scaleFrame();

function applyStep(idx) {
  const wrap = document.getElementById('frameWrap');
  const iframe = document.getElementById('proto');

  // Reload iframe to reset state, then apply
  iframe.onload = function() {
    iframe.onload = null;
    try {
      const w = iframe.contentWindow;
      const doc = iframe.contentDocument;
      STEPS[idx].action(w, doc);
    } catch(e) {}
    scaleFrame();
  };
  iframe.src = '../billing-history-agent-filter.html?' + idx; // cache-bust per step
}

function updateUI() {
  // Pills
  STEPS.forEach(function(s, i) {
    document.getElementById('pill-' + i).classList.toggle('active', i === current);
  });
  // Counter
  document.getElementById('step-counter').textContent = (current + 1) + ' / ' + STEPS.length;
  // Nav buttons
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === STEPS.length - 1;
  document.getElementById('btn-next').textContent = current === STEPS.length - 1 ? 'Done' : 'Next →';
  // Caption
  document.getElementById('cap-badge').textContent = STEPS[current].badge;
  document.getElementById('cap-text').innerHTML = STEPS[current].caption;
  document.getElementById('cap-usecase').textContent = STEPS[current].usecase;
}

function goTo(idx) {
  current = idx;
  updateUI();
  applyStep(idx);
}

function next() { if (current < STEPS.length - 1) goTo(current + 1); }
function prev() { if (current > 0) goTo(current - 1); }

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prev();
});

// Init
applyStep(0);
updateUI();
</script>

</body>
</html>
